<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Moja Strona GitHub Pages</title>
</head>
<body>

    <h1>Parametr z adresu URL:</h1>
    <p id="wyswietlanie">Brak parametru w adresie.</p>

    <script>
        // Funkcja pobierająca parametr
        function getParam() {
            const params = new URLSearchParams(window.location.search);
            return params.get('url'); // Pobiera wartość po ?url=
        }

        const wartosc = getParam();
        const element = document.getElementById('wyswietlanie');

        if (wartosc) {
            element.innerHTML = "Wartość to: <strong>" + wartosc + "</strong>";
        }
    </script>

</body>
</html>
