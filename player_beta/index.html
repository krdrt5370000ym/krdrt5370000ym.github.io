<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Radio Player PRO</title>

<style>
body { font-family: Arial; margin:20px; }

.current { border:1px solid #ccc; padding:15px; margin-bottom:20px; }

.schedule_tabs button {
  padding:10px;
  cursor:pointer;
  background:#eee;
  border:none;
}

.schedule_tabs button.active {
  background:#333;
  color:#fff;
}

.tabcontent { display:none; border:1px solid #ccc; padding:10px; }

.schedule_program { margin-bottom:10px; }

.program_list_content {
  border-bottom:1px solid #eee;
  margin-bottom:10px;
  padding:5px;
}

img { width:50px; height:50px; }
</style>
</head>

<body>

<!-- ON AIR -->
<div class="current">
  <h2>Teraz na antenie</h2>
  <div class="current_program_item"></div>
  <div class="current_program_hour"></div>
  <div class="current_program_title"></div>
  <div class="current_program_host"></div>
  <img class="current_program_photo">
</div>

<!-- PLAYER -->
<select id="stationSelect"></select>
<br><br>
<audio id="player" controls autoplay></audio>

<hr>

<!-- TABS -->
<div class="schedule_tabs" id="tabs"></div>
<div class="schedule_tab_contents" id="tab_contents"></div>

<hr>

<!-- PROGRAMY -->
<h3>Programy</h3>
<select id="categoryFilter">
  <option value="">Wszystkie</option>
  <option value="Audiobooki">Audiobooki</option>
</select>

<div class="program_list" id="program_list"></div>

<script>
let CURRENT_STATION = null;
  
// =====================
const dayOrder = ["1","2","3","4","5","6","0"];

const dayNames = {
  "1":"Poniedziałek","2":"Wtorek","3":"Środa",
  "4":"Czwartek","5":"Piątek","6":"Sobota","0":"Niedziela"
};

let PROGRAMS = [];
let IMAGES = [];
let SCHEDULE = [];
let STATIONS = [];

// =====================
// LOAD DATA
// =====================
async function loadData() {
  const [images, programs, schedule, stations] = await Promise.all([
    fetch("https://krdrt5370000ym.github.io/player_beta/json/test_images.json").then(r=>r.json()),
    fetch("https://krdrt5370000ym.github.io/player_beta/json/test_programs.json").then(r=>r.json()),
    fetch("https://krdrt5370000ym.github.io/player_beta/json/test_schedule.json").then(r=>r.json()),
    fetch("https://krdrt5370000ym.github.io/player_beta/json/test_station.json").then(r=>r.json())
  ]);

  IMAGES = images;
  PROGRAMS = programs;
  SCHEDULE = schedule;
  STATIONS = stations.station;

  init();
}

// =====================
// HELPERS
// =====================
function formatHour(h){ return h.slice(0,5); }

function isInTimeRange(start,end,current){
  if(start<end) return current>=start && current<end;
  return current>=start || current<end;
}

function getProgramData(p){
  if(!p) return null;

  let data = p;

  if(p.id){
    data = PROGRAMS.find(x=>x.id===p.id) || p;
  }

  if(p.thumbnail_id){
    const img = IMAGES.find(i=>i.thumbnail_id===p.thumbnail_id);
    if(img) data.thumbnail_uri = img.thumbnail_uri;
  }

  return data;
}

// =====================
// ON AIR
// =====================
function renderCurrent(){
  const now = new Date();
  const day = now.getDay().toString();
  const time = now.toTimeString().slice(0,8);

  const program = SCHEDULE
    .filter(p => 
      p.active && 
      p.days.includes(day) && 
      (!p.station || p.station.includes(CURRENT_STATION)) &&
      isInTimeRange(p.hour_start, p.hour_end, time)
    )
    .sort((a, b) => (b.station ? 1 : 0) - (a.station ? 1 : 0)) // Stacja ma priorytet nad globalnymi
    .find(() => true); // Pobierz pierwszy pasujący po posortowaniu

  const data = getProgramData(program);
  if(!data) return;

  document.querySelector(".current_program_hour").textContent =
    formatHour(program.hour_start)+" - "+formatHour(program.hour_end);

  document.querySelector(".current_program_title").textContent = data.name || "";
  document.querySelector(".current_program_host").textContent = data.host || "";
  document.querySelector(".current_program_photo").src =
    data.thumbnail_uri || "https://cdn.music.smcloud.net/t/cover/677b175e-35bd-4b9b-a271-629040ccdd98_ER_500x500-2-cover_500x500.png";
}

// =====================
// TABS
// =====================
function renderTabs() {
  const tabsContainer = document.getElementById("tabs");
  const contentsContainer = document.getElementById("tab_contents");
  
  // Pobieranie aktualnego czasu do porównania
  const now = new Date();
  const currentDay = now.getDay().toString(); // np. "6" dla soboty
  const currentTime = now.toTimeString().slice(0, 8); // format "HH:MM:SS"

  dayOrder.forEach((day, index) => {
    const btn = document.createElement("button");
    btn.textContent = dayNames[day];
    
    // Automatyczne aktywowanie zakładki dla dzisiejszego dnia
    const isToday = day === currentDay;
    if (isToday) btn.classList.add("active");

    const tabContent = document.createElement("div");
    tabContent.className = "tabcontent";
    tabContent.id = `tab_${day}`;
    tabContent.style.display = isToday ? "block" : "none";

    // Obsługa kliknięcia (przełączanie)
    btn.onclick = () => {
      document.querySelectorAll(".tabcontent").forEach(t => t.style.display = "none");
      document.querySelectorAll("#tabs button").forEach(b => b.classList.remove("active"));
      tabContent.style.display = "block";
      btn.classList.add("active");
    };

    const dailyPrograms = SCHEDULE.filter(p => 
      p.active && p.days.includes(day) && !p.hide_in_schedule &&
      (!p.station || p.station.includes(CURRENT_STATION))
    ).sort((a, b) => a.hour_start.localeCompare(b.hour_start));

    dailyPrograms.forEach(p => {
      const data = getProgramData(p);
      if (!data) return;
    
      const el = document.createElement("div");
      let isOnAir = false;
    
      if (isToday) {
        const now = currentTime; // np. "17:29:00"
        const start = p.hour_start; // np. "23:00:00"
        const end = p.hour_end; // np. "19:00:00"
    
        if (start < end) {
          // Standard: start 06:00, koniec 19:00 (tego samego dnia)
          isOnAir = now >= start && now < end;
        } else {
          // Przejście przez północ: start 23:00, koniec 19:00 (następnego dnia)
          // JESTEŚMY "ON AIR", jeśli:
          // 1. Jest już PO godzinie startu (np. 23:30 w piątek)
          // 2. LUB jest jeszcze PRZED godziną końca (np. 17:29 w sobotę)
          isOnAir = now >= start || now < end;
        }
      }
    
      el.className = isOnAir ? "schedule_program onair" : "schedule_program";

      el.innerHTML = `
        <div class="prog_item">${p.item || ""}</div>
        <b>${formatHour(p.hour_start)} - ${formatHour(p.hour_end)}</b>
        <div onclick="LoadProgram('${data.id}')" style="cursor:pointer">${data.name}</div>
        <div>${data.host || ""}</div>
        ${data.thumbnail_uri ? `<img src="${data.thumbnail_uri}">` : ""}
      `;
      tabContent.appendChild(el);
});

    tabsContainer.appendChild(btn);
    contentsContainer.appendChild(tabContent);
  });
}

// =====================
// PROGRAM LIST
// =====================
function renderPrograms(){
  const container = document.getElementById("program_list");
  const filter = document.getElementById("categoryFilter").value;

  container.innerHTML="";

  PROGRAMS
    .filter(p => !p.hide_in_program && !p.private)
    .filter(p => !filter || p.category === filter)
    .filter(p =>
      !p.station || 
      p.station.includes(CURRENT_STATION)
    )
    // Dodane sortowanie A-Z według nazwy
    .sort((a, b) => {
      // 1. Porównaj wartość "sorted" (jeśli istnieje)
      const sortA = a.sorted || "";
      const sortB = b.sorted || "";
      
      const result = sortA.toString().localeCompare(sortB.toString(), undefined, { numeric: true });
    
      // 2. Jeśli "sorted" są identyczne (wynik 0), sortuj po "name"
      return result !== 0 ? result : a.name.localeCompare(b.name);
    })
    .forEach(p=>{
      const el = document.createElement("div");
      el.className="program_list_content";

      el.innerHTML = `
        <img src="${p.thumbnail_uri}">
        <div onclick="LoadProgram('${p.id}')">${p.name}</div>
        <div>${p.host}</div>
      `;

      container.appendChild(el);
    });
}

// =====================
// STATIONS
// =====================
function reloadAll(){
  document.getElementById("tabs").innerHTML = "";
  document.getElementById("tab_contents").innerHTML = "";

  renderCurrent();
  renderTabs();
  renderPrograms();
}

function renderStations(){
  const select = document.getElementById("stationSelect");
  const player = document.getElementById("player");

  select.innerHTML = "";

  STATIONS.forEach((s, index)=>{
    const opt = document.createElement("option");
    opt.value = s.id;
    opt.textContent = s.name;
    select.appendChild(opt);

    if(index === 0){
      CURRENT_STATION = s.id;
      player.src = s.stream;
    }
  });

  select.onchange = ()=>{
    const selected = STATIONS.find(s => s.id === select.value);

    CURRENT_STATION = selected.id;

    player.src = selected.stream;
    player.play();

    // 🔥 przeładuj widoki
    reloadAll();
  };

  reloadAll();
}

// =====================
// LOAD PROGRAM PAGE
// =====================
function LoadProgram(id){
  const program = PROGRAMS.find(p=>p.id===id);
  if(!program) return;

  const html = `
    <h2>${program.name}</h2>
    <img src="${program.thumbnail_uri}">
    <p>${program.host}</p>
    <p>${program.onair || ""}</p>
    ${program.description || ""}
  `;

  const win = window.open("", "_blank");
  win.document.write(html);
}

// =====================
// INIT
// =====================
function init(){
  renderCurrent();
  renderTabs();
  renderPrograms();
  renderStations();

  document.getElementById("categoryFilter").onchange = renderPrograms;

  setInterval(renderCurrent,60000);
}

loadData();

</script>

</body>
</html>
