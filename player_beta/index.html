<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Radio Player Schedule</title>

<style>
body { font-family: Arial; margin:20px; }

.current {
  padding:15px;
  border:1px solid #ccc;
  margin-bottom:20px;
}

.tabs {
  margin-bottom:10px;
}

.tabs button {
  padding:10px;
  cursor:pointer;
  border:none;
  background:#eee;
  margin-right:5px;
}

.tabs button.active {
  background:#333;
  color:#fff;
}

.tabcontent {
  display:none;
  padding:10px;
  border:1px solid #ccc;
}

.schedule_program {
  margin-bottom:10px;
  padding:5px;
  border-bottom:1px solid #eee;
}

img {
  width:50px;
  height:50px;
}
</style>
</head>

<body>

<!-- ON AIR -->
<div class="current">
  <h2>Teraz na antenie</h2>
  <div class="current_program_hour"></div>
  <div class="current_program_title"></div>
  <div class="current_program_host"></div>
  <img class="current_program_photo">
</div>

<!-- TABS -->
<div class="tabs" id="tabs"></div>
<div id="tab_contents"></div>

<script>

// =====================
// 📅 DNI (Pon → Niedziela)
// =====================
const dayOrder = ["1","2","3","4","5","6","0"];

const dayNames = {
  "1":"Poniedziałek",
  "2":"Wtorek",
  "3":"Środa",
  "4":"Czwartek",
  "5":"Piątek",
  "6":"Sobota",
  "0":"Niedziela"
};

// =====================
// 🌐 LOAD JSON
// =====================
async function loadData() {
  const [images, programs, schedule] = await Promise.all([
    fetch("https://krdrt5370000ym.github.io/player_beta/json/test_images.json").then(r=>r.json()),
    fetch("https://krdrt5370000ym.github.io/player_beta/json/test_programs.json").then(r=>r.json()),
    fetch("https://krdrt5370000ym.github.io/player_beta/json/test_schedule.json").then(r=>r.json())
  ]);

  init(images, programs, schedule);
}

// =====================
// 🧠 HELPERS
// =====================
function formatHour(h) {
  return h.slice(0,5);
}

function isInTimeRange(start, end, current) {
  if (start < end) return current >= start && current < end;
  return current >= start || current < end;
}

function getProgramData(p, programs, images) {
  if (!p) return null;

  let data = p;

  if (p.id) {
    data = programs.find(x => x.id === p.id) || p;
  }

  // override obrazka
  if (p.thumbnail_id) {
    const img = images.find(i => i.thumbnail_id === p.thumbnail_id);
    if (img) data.thumbnail_uri = img.thumbnail_uri;
  }

  return data;
}

// =====================
// 🔴 ON AIR
// =====================
function renderCurrent(schedule, programs, images) {
  const now = new Date();
  const day = now.getDay().toString();
  const time = now.toTimeString().slice(0,8);

  const program = schedule.find(p =>
    p.active &&
    p.days.includes(day) &&
    isInTimeRange(p.hour_start, p.hour_end, time)
  );

  const data = getProgramData(program, programs, images);
  if (!data) return;

  document.querySelector(".current_program_hour").textContent =
    formatHour(program.hour_start) + " - " + formatHour(program.hour_end);

  document.querySelector(".current_program_title").textContent = data.name || "";
  document.querySelector(".current_program_host").textContent = data.host || "";
  document.querySelector(".current_program_photo").src = data.thumbnail_uri || "";
}

// =====================
// 📅 TABS + RAMÓWKA
// =====================
function renderTabs(schedule, programs, images) {
  const tabs = document.getElementById("tabs");
  const contents = document.getElementById("tab_contents");

  dayOrder.forEach((day, index) => {

    // 🔘 BUTTON
    const btn = document.createElement("button");
    btn.textContent = dayNames[day];

    btn.onclick = () => {
      document.querySelectorAll(".tabcontent").forEach(t=>t.style.display="none");
      document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));

      document.getElementById("tab_"+day).style.display = "block";
      btn.classList.add("active");
    };

    if (index === 0) btn.classList.add("active");

    tabs.appendChild(btn);

    // 📦 CONTENT
    const tab = document.createElement("div");
    tab.className = "tabcontent";
    tab.id = "tab_"+day;

    if (index === 0) tab.style.display = "block";

    const dayPrograms = schedule
      .filter(p =>
        p.active &&
        p.days.includes(day) &&
        !p.hide_in_schedule
      )
      .sort((a,b)=> a.hour_start.localeCompare(b.hour_start));

    dayPrograms.forEach(p => {
      const data = getProgramData(p, programs, images);
      if (!data) return;

      const el = document.createElement("div");
      el.className = "schedule_program";

      el.innerHTML = `
        <div><b>${formatHour(p.hour_start)} - ${formatHour(p.hour_end)}</b></div>
        <div>${data.name || ""}</div>
        <div>${data.host || ""}</div>
        ${data.thumbnail_uri ? `<img src="${data.thumbnail_uri}">` : ""}
      `;

      tab.appendChild(el);
    });

    contents.appendChild(tab);
  });
}

// =====================
// 🚀 INIT
// =====================
function init(images, programs, schedule) {
  renderCurrent(schedule, programs, images);
  renderTabs(schedule, programs, images);

  // 🔄 auto refresh co 60s
  setInterval(() => {
    renderCurrent(schedule, programs, images);
  }, 60000);
}

loadData();

</script>

</body>
</html>
