<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Radio Player PRO</title>

<style>
body { font-family: Arial; margin:20px; }

.current { border:1px solid #ccc; padding:15px; margin-bottom:20px; }

.schedule_tabs button {
  padding:10px;
  cursor:pointer;
  background:#eee;
  border:none;
}

.schedule_tabs button.active {
  background:#333;
  color:#fff;
}

.tabcontent { display:none; border:1px solid #ccc; padding:10px; }

.schedule_program { margin-bottom:10px; }

.program_list_content {
  border-bottom:1px solid #eee;
  margin-bottom:10px;
  padding:5px;
}

img { width:50px; height:50px; }
</style>
</head>

<body>

<!-- ON AIR -->
<div class="current">
  <h2>Teraz na antenie</h2>
  <div class="current_program_item"></div>
  <div class="current_program_hour"></div>
  <div class="current_program_title"></div>
  <div class="current_program_host"></div>
  <img class="current_program_photo">
</div>

<!-- PLAYER -->
<select id="stationSelect"></select>
<br><br>
<audio id="player" controls autoplay></audio>

<hr>

<!-- TABS -->
<div class="schedule_tabs" id="tabs"></div>
<div class="schedule_tab_contents" id="tab_contents"></div>

<hr>

<!-- PROGRAMY -->
<h3>Programy</h3>
<select id="categoryFilter">
  <option value="">Wszystkie</option>
  <option value="Audiobooki">Audiobooki</option>
</select>

<div class="program_list" id="program_list"></div>

<script>
let CURRENT_STATION = null;

// =====================
const dayOrder = ["1","2","3","4","5","6","0"];

const dayNames = {
  "1":"Poniedziałek","2":"Wtorek","3":"Środa",
  "4":"Czwartek","5":"Piątek","6":"Sobota","0":"Niedziela"
};

let PROGRAMS = [];
let IMAGES = [];
let SCHEDULE = [];
let STATIONS = [];

let lastDay = new Date().getDay();

// =====================
// LOAD DATA
// =====================
async function loadData() {
  const [images, programs, schedule, stations] = await Promise.all([
    fetch("https://krdrt5370000ym.github.io/player_beta/json/test_images.json").then(r=>r.json()),
    fetch("https://krdrt5370000ym.github.io/player_beta/json/test_programs.json").then(r=>r.json()),
    fetch("https://krdrt5370000ym.github.io/player_beta/json/test_schedule.json").then(r=>r.json()),
    fetch("https://krdrt5370000ym.github.io/player_beta/json/test_station.json").then(r=>r.json())
  ]);

  IMAGES = images;
  PROGRAMS = programs;
  SCHEDULE = schedule;
  STATIONS = stations.station;
}

// =====================
// HELPERS
// =====================
function formatHour(h){ return h.slice(0,5); }

function isInTimeRange(start, end, current) {
  if (start < end) {
    return current >= start && current < end;
  }
  // Przypadek, gdy program kończy się następnego dnia
  return current >= start || current < end;
}

function getProgramData(p){
  if(!p) return null;

  let data = p;

  if(p.id){
    data = PROGRAMS.find(x=>x.id===p.id) || p;
  }

  if(p.thumbnail_id){
    const img = IMAGES.find(i=>i.thumbnail_id===p.thumbnail_id);
    if(img) data.thumbnail_uri = img.thumbnail_uri;
  }

  return data;
}

// =====================
// ON AIR
// =====================
function renderCurrent() {
  const now = new Date();
  const currentDay = now.getDay().toString(); // 0-6
  const yesterday = (currentDay === "0" ? "6" : (parseInt(currentDay) - 1).toString());
  const currentTime = now.toTimeString().slice(0, 8); // Format "HH:mm"

  let currentProgram = null;

  // 1. AKTUALIZACJA WIDOKU HARMONOGRAMU (Klasy .onair)
  document.querySelectorAll('.schedule_program').forEach(row => {
    const start = row.dataset.start;
    const end = row.dataset.end;
    if (!start || !end) return;

    const dayOfTab = row.closest('.tabcontent').id.replace('tab_', '');
    let active = false;

    // Logika sprawdzania, czy program trwa (uwzględnia przejście przez północ)
    if (dayOfTab === currentDay) {
      if (start < end) {
        active = currentTime >= start && currentTime < end;
      } else {
        // Program zaczął się dzisiaj i trwa po północy (np. start 23:00, teraz 23:30)
        active = currentTime >= start;
      }
    } else if (dayOfTab === yesterday) {
      // Program zaczął się wczoraj i trwa dzisiaj (np. start 23:00, end 20:00, teraz 19:00)
      if (start > end) {
        active = currentTime < end;
      }
    }

    row.classList.toggle('onair', active);
    
    // Jeśli ten wiersz jest aktywny i pasuje do aktualnej stacji, zapisz go do renderowania góry
    if (active) {
      // Tutaj opcjonalnie sprawdź p.station, jeśli masz wiele stacji w jednym widoku
      currentProgram = row; 
    }
  });

  // 2. AUTO-SCROLL (Tylko jeśli znaleziono aktywny element)
  const activeEl = document.querySelector('.schedule_program.onair');
  if (activeEl) {
    activeEl.scrollIntoView({ behavior: "smooth", block: "center" });
  }

  // 3. RENDEROWANIE NAGŁÓWKA "TERAZ NA ANTENIE"
  // Pobieramy dane z SCHEDULE na podstawie aktywnego wiersza lub filtracji
  const activeProgramData = SCHEDULE.filter(p => {
  const isStation = !p.station || p.station.includes(CURRENT_STATION);
  if (!isStation || !p.active) return false;

  const isToday = p.days.includes(currentDay);
  const isFromYesterday = p.days.includes(yesterday) && p.hour_start > p.hour_end;

  if (isToday) {
    return p.hour_start <= p.hour_end 
      ? (currentTime >= p.hour_start && currentTime < p.hour_end)
      : (currentTime >= p.hour_start);
  } 
  if (isFromYesterday) {
    return currentTime < p.hour_end;
  }
  return false;
})
// Kluczowe: Sortujemy tak, aby subschedule (krótsze pasma) miały priorytet nad głównymi
.sort((a, b) => {
  if (a.subschedule && !b.subschedule) return -1;
  if (!a.subschedule && b.subschedule) return 1;
  return 0;
})[0]; // Bierzemy pierwszy pasujący (najbardziej szczegółowy)

if (!activeProgramData) return;

const data = getProgramData(activeProgramData);
if (!data) return;

// Logika dla HOST: jeśli host to "null", nie wyświetlaj go (lub ustaw pusty string)
const displayProgramName = (p.name === "null" || !p.name) ? data.name : p.name;
const displayHost = (p.host === "null" || !p.host) ? data.host : p.host;

// Mapowanie do DOM z poprawką literówki (iten -> item)
const ui = {
  item: document.querySelector(".current_program_item"),
  hour: document.querySelector(".current_program_hour"),
  title: document.querySelector(".current_program_title"),
  host: document.querySelector(".current_program_host"),
  photo: document.querySelector(".current_program_photo")
};

if (ui.item) ui.item.textContent = activeProgramData.item || "";
if (ui.hour) ui.hour.textContent = `${formatHour(activeProgramData.hour_start)} - ${formatHour(activeProgramData.hour_end)}`;
if (ui.title) ui.title.textContent = displayProgramName;
if (ui.host) ui.host.textContent = displayHost;
if (ui.photo) ui.photo.src = data.thumbnail_uri || "https://cdn.radios.smcloud.net/t/radios/se_logo_ok_rp-1BPK-Qiy3-esTr_500x500.png";
}

// =====================
// TABS
// =====================
function renderTabs() {
  const tabsContainer = document.getElementById("tabs");
  const contentsContainer = document.getElementById("tab_contents");

  const now = new Date();
  const currentDay = now.getDay().toString();

  tabsContainer.innerHTML = "";
  contentsContainer.innerHTML = "";

  dayOrder.forEach((day) => {
    const isToday = (day === currentDay);

    const btn = document.createElement("button");
    btn.textContent = dayNames[day];
    if (isToday) btn.classList.add("active");

    const tabContent = document.createElement("div");
    tabContent.className = "tabcontent";
    tabContent.id = `tab_${day}`;
    tabContent.style.display = isToday ? "block" : "none";

    btn.onclick = () => {
      document.querySelectorAll(".tabcontent").forEach(t => t.style.display = "none");
      document.querySelectorAll("#tabs button").forEach(b => b.classList.remove("active"));
      tabContent.style.display = "block";
      btn.classList.add("active");
    };

    const dailyPrograms = SCHEDULE.filter(p => 
      p.active && 
      p.days.includes(day) && 
      !p.hide_in_schedule &&
      (!p.station || p.station.includes(CURRENT_STATION))
    ).sort((a, b) => a.hour_start.localeCompare(b.hour_start));

    dailyPrograms.forEach(p => {
      const data = getProgramData(p);
      if (!data) return;
      
        const el = document.createElement("div");
        
        el.className = p.subschedule === true ? "schedule_program small" : "schedule_program";
        
        // Decyzja o ID dla funkcji LoadProgram
        const programId = data.private === true ? 'null' : `'${data.id}'`;
      
      el.dataset.start = p.hour_start; 
      el.dataset.end = p.hour_end;

      const displayProgramName = (p.name === "null" || !p.name) ? data.name : p.name;
      const displayHost = (p.host === "null" || !p.host) ? data.host : p.host;

      el.innerHTML = `
        <div class="prog_item">${p.item || ""}</div>
        <div class="prog_time"><b>${formatHour(p.hour_start)} - ${formatHour(p.hour_end)}</b></div>
        <div class="prog_name" onclick="LoadProgram(${programId})" style="cursor:pointer">
          ${displayProgramName}
        </div>
        <div class="prog_host">${displayHost}</div>
        ${data.thumbnail_uri ? `<img src="${data.thumbnail_uri}" alt="${data.name}">` : ""}
      `;

      tabContent.appendChild(el);
    });

    tabsContainer.appendChild(btn);
    contentsContainer.appendChild(tabContent);
  });
}

// =====================
// ON AIR STATUS
// =====================
function updateOnAirStatus() {
  const now = new Date();
  const currentDay = now.getDay().toString();
  const currentTime = now.toTimeString().slice(0, 5);

  const yesterday = (currentDay === "0" ? "6" : (parseInt(currentDay) - 1).toString());

  document.querySelectorAll('.schedule_program').forEach(row => {
    const start = row.dataset.start;
    const end = row.dataset.end;

    if (!start || !end) return;

    const dayOfTab = row.closest('.tabcontent').id.replace('tab_', '');

    const isTodayTab = dayOfTab === currentDay;
    const isYesterdayTab = dayOfTab === yesterday;

    let active = false;

    if (isTodayTab) {
      active = isInTimeRange(start, end, currentTime);
    } else if (isYesterdayTab && start > end) {
      active = currentTime < end;
    }

    row.classList.toggle('onair', active);
  });

  // auto scroll do aktualnego
  const activeEl = document.querySelector('.schedule_program.onair');
  if (activeEl) {
    activeEl.scrollIntoView({ behavior: "smooth", block: "center" });
  }
}

// =====================
// PROGRAM LIST
// =====================
function renderPrograms(){
  const container = document.getElementById("program_list");
  const filter = document.getElementById("categoryFilter").value;

  container.innerHTML="";

  PROGRAMS
    .filter(p => !p.hide_in_program && !p.private)
    .filter(p => !filter || p.category === filter)
    .filter(p => !p.station || p.station.includes(CURRENT_STATION))
    .sort((a, b) => {
      const sortA = a.sorted || "";
      const sortB = b.sorted || "";
      const result = sortA.toString().localeCompare(sortB.toString(), undefined, { numeric: true });
      return result !== 0 ? result : a.name.localeCompare(b.name);
    })
    .forEach(p=>{
      const el = document.createElement("div");
      el.className="program_list_content";

      el.innerHTML = `
        <img src="${p.thumbnail_uri}">
        <div onclick="LoadProgram('${p.id}')">${p.name}</div>
        <div>${p.host}</div>
      `;

      container.appendChild(el);
    });
}

// =====================
// STATIONS
// =====================
function renderStations(){
  const select = document.getElementById("stationSelect");
  const player = document.getElementById("player");

  select.innerHTML = "";

  STATIONS.forEach((s, index)=>{
    const opt = document.createElement("option");
    opt.value = s.id;
    opt.textContent = s.name;
    select.appendChild(opt);

    if(index === 0){
      CURRENT_STATION = s.id;
      player.src = s.stream;
    }
  });

  select.onchange = ()=>{
    const selected = STATIONS.find(s => s.id === select.value);

    CURRENT_STATION = selected.id;
    player.src = selected.stream;
    player.play();

    reloadAll();
  };
}

function reloadAll(){
  renderCurrent();
  renderTabs();
  renderPrograms();
}

// =====================
// PROGRAM PAGE
// =====================
function getDisplaySchedule(programId) {
  const daysMap = { "1": "Pn", "2": "Wt", "3": "Śr", "4": "Cz", "5": "Pt", "6": "Sob", "0": "Ndz" };
  
  // Filtrujemy wpisy w grafiku dla konkretnego programu
  const occurrences = SCHEDULE.filter(s => s.id === programId && s.active);
  
  const groups = occurrences.map(occ => {
    // Sortujemy dni rosnąco (ważne dla Ndz=0 / Pn=1)
    const sortedDays = [...occ.days].sort();
    const dayLabels = sortedDays.map(d => daysMap[d]);
    
    let dayString = dayLabels.join(", ");
    
    // Logika dla Pn - Pt
    if (occ.days.length === 5 && occ.days.every(d => ["1","2","3","4","5"].includes(d))) {
      dayString = "Pn - Pt";
    }

    return `${dayString}, ${formatHour(occ.hour_start)} - ${formatHour(occ.hour_end)}`;
  });

  return groups.join(" | ");
}

function LoadProgram(id) {
  if (id === null) return;

  const program = PROGRAMS.find(p => p.id === id);
  if (!program || program.private === true) return;

  const scheduleInfo = getDisplaySchedule(id);

  const html = `
    <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 30px; line-height: 1.6; color: #333; }
      img { max-width: 100%; height: auto; border-radius: 8px; margin-bottom: 20px; }
      h2 { color: #000; margin-top: 0; }
      .meta { color: #666; font-size: 0.9em; margin-bottom: 10px; }
    </style>
    ${program.thumbnail_uri ? `<img src="${program.thumbnail_uri}">` : ""}
    <h2>${program.name}</h2>
    <div class="meta">
      <div><b>Prowadzący:</b> ${program.host || "---"}</div>
      <div><b>Emisja:</b> ${scheduleInfo}</div>
    </div>
    <hr>
    <div>${program.description || "Brak opisu programu."}</div>
  `;

  const win = window.open("", "_blank");
  win.document.write(html);
  win.document.close();
}

// =====================
// INIT
// =====================
function init() {
  renderStations();
  renderCurrent();
  renderTabs();
  renderPrograms();
  updateOnAirStatus();

  document.getElementById("categoryFilter").onchange = renderPrograms;

  setInterval(() => {
    const now = new Date();
    const newDay = now.getDay();

    renderCurrent();
    updateOnAirStatus();

    if (newDay !== lastDay) {
      renderTabs();
      lastDay = newDay;
    }

  }, 60000);
}

// =====================
// START
// =====================
loadData().then(init);
</script>

</body>
</html>
