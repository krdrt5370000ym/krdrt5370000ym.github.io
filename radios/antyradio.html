<!DOCTYPE html>
<html lang="pl">
   <head>
      <title>Antyradio, słuchaj online | KrdrtRadio</title>
      <script src="/site-head.js"></script>
      <link rel="stylesheet" href="/style-def.css">
      <link rel="stylesheet" href="radios.css">
      <script src="radios-head.js"></script>
   </head>
   <body>
      <div>
         <script src="/site-top.js"></script>
         <div class="overlay" id="overlay"></div>
         <main class="main-content">
            <script src="/site-tophead.js"></script>
            <section class="hero">
            <!-- ON AIR -->
            <div class="current">
               <h4>Teraz na antenie:</h4>
               <div class="current_program" id="resultCP">
                  <div class="current_program_photo"><img src="https://i.ibb.co/HLvQzMdQ/antyradio.png"></div>
                  <div>
                     <div class="current_program_item"></div>
                     <div class="current_program_hour"></div>
                     <div class="current_program_title">Radio Online</div>
                     <div class="current_program_host"></div>
                  </div>
               </div>
               <div class="current_playlist" id="resultTrack"></div>
            </div>
            <!-- PLAYER -->
            <div class="radio-player-container">
               <div class="player-header">
                  <select id="stationSelect" class="styled-select">
                  </select>
                  <button class="play-btn" onclick="ReloadAudio()" title="Odśwież/Graj">
                  <i class="fa-solid fa-play"></i>
                  </button>
               </div>
               <audio id="player" controls class="custom-audio-element"></audio>
               <div class="button-grid" id="site_buttons_list">
               </div>
            </div>
            <hr>
            <div class="tabs">
               <input type="radio" id="r-tab1" name="my-tabs" checked>
               <input type="radio" id="r-tab2" name="my-tabs">
               <div class="tabs-wrapper">
                  <label id="AllContentDisplay" for="r-tab1">Ramówka</label>
                  <label id="AllProgramsDisplay" for="r-tab2">Programy</label>
               </div>
               <div class="content r-tab1-content">
                  <!-- RAMÓWKA -->
                  <div class="schedule_display" id="ScheduleDisplay" style="display:block;">
                     <div class="tab">
                        <button id="MainSchBtn" class="tablinks active" onclick="openTab(event, 'sch_schedule')">Tydzień</button>
                        <button id="DetailSchBtn" class="tablinks" onclick="openTab(event, 'sch_detail')">Szczegółowe dni</button>
                     </div>
                     <div id="sch_schedule" class="tabcontent" style="display:block;">
                        <div class="schedule_tabs" id="days"></div>
                        <div id="day_contents"></div>
                     </div>
                     <div id="sch_detail" class="tabcontent schedule_detail">
                        <div class="sdetail_list" id="sdetail_list"></div>
                     </div>
                  </div>
               </div>
               <div class="content r-tab2-content">
                  <!-- PROGRAMY -->
                  <div class="programs_display" id="AllProgramsDisplay" style="display:block;">
                     <h3>Programy</h3>
                     <input type="text" id="searchInput" placeholder="Szukaj programu lub autora..." oninput="renderPrograms()">
                     <select id="categoryFilter" onchange="renderPrograms()">
                        <option value="">Wszystkie kategorie</option>
                     </select>
                     <div class="program_list" id="program_list"></div>
                  </div>
               </div>
            </div>
            </section>
            <script src="/site-bottom.js"></script>
         </main>
      </div>
      <script src="/script.js"></script>
      <script src="/script-def.js"></script>
      <script src="radios.js"></script>
      <script src="site-nowplaying.js"></script>
      <script>loadData('antyradio').then(init);</script>
   </body>
</html>
