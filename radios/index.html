<!DOCTYPE html>
<html>
   <head>
      <title>Radio | krdrt537000ym.github.io</title>
      <script src="/site-head.js"></script>
      <link rel="stylesheet" href="/style.css">
   </head>
   <body class="w3-light-grey">
      <script src="/site-topscreen.js"></script>
      <div class="w3-main" style="margin-left:300px;margin-top:43px;">
         <!-- Header -->
         <header class="w3-container" style="padding-top:22px">
            <h5><b><i class="fa-solid fa-radio"></i> Radio</b></h5>
         </header>
         <div class="w3-row-padding w3-margin-bottom">
            <script>
              // Generate a random number based on the current time
              var cacheBuster = new Date().getTime();
              
              // Build the iframe URL dynamically
              var iframeUrl = "https://view.officeapps.live.com/op/embed.aspx?src=https://krdrt5370000ym.github.io/radios/radios.xlsb?v=" + cacheBuster + "&AllowTyping=True";
              
              // Write the iframe to the page
              document.write('<iframe src="' + iframeUrl + '" frameborder="0" scrolling="no" style="overflow:hidden; height:500px; width:100%; top: 0; left: 0; bottom: 0; right: 0;" height="500" width="100%"></iframe>');
            </script>
            <p>Wybierz kategorię stacji radiowej, naciśnij <b>„Wł.”</b>, po czym naciśnij na klawiaturze <b>Ctrl+C</b>, dotknij i wybierz <b>„Kopiuj”</b> lub kliknij prawym przyciskiem myszy <i>(piszą HTML)</i>, a następnie przejdź do przeglądarki i wklej adres URL. Aktualizacja nie zostanie jednak zapisana w przeglądarce.</p>
         </div>
         <script src="/site-bottomscreen.js"></script>
      </div>
      <script src="/site-sidebar.js"></script>
      <script>
// 1. Pobranie elementu iframe
const iframe = document.getElementById('my-iframe');

// 2. Bezpieczny dostęp do dokumentu i okna iframe
if (iframe) {
    const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
    const iframeWindow = iframe.contentWindow;

    // Funkcja usuwająca konkretne ciasteczko wewnątrz iframe
    function deleteIframeCookie(name) {
        // Ustawienie daty wygaśnięcia na przeszłość usuwa ciasteczko
        iframeDoc.cookie = name + '=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
        console.log(`Próba usunięcia ciasteczka: ${name}`);
    }

    // Wywołanie funkcji - wstaw nazwę ciasteczka zamiast 'nazwa_ciasteczka'
    deleteIframeCookie('nazwa_ciasteczka');

    // 3. Opcjonalnie: Poinformowanie iframe o konieczności wyczyszczenia danych (postMessage)
    // Działa również dla różnych domen, jeśli iframe słucha wiadomości
    iframeWindow.postMessage('clearCookies', 'https://krdrt5370000ym.github.io/radios/');
}
      </script>
   </body>
</html>
