<!DOCTYPE html>
<html>
   <head>
      <title>Planeta FM, słuchaj online | krdrt537000ym.github.io</title>
      <script src="/site-head.js"></script>
   </head>
   <body class="w3-light-grey">
      <link rel="stylesheet" href="media.css">
      <link rel="stylesheet" href="/style.css">
      <script src="/site-topscreen.js"></script>
      <div class="w3-main" style="margin-left:300px;margin-top:43px;">
         <!-- Header -->
         <header class="w3-container" style="padding-top:22px">
            <h5>
               <b>
               <i class="fa-solid fa-photo-film"></i> Media</b>
            </h5>
         </header>
         <div class="w3-row-padding w3-margin-bottom">
            <div class="media-container">
               <!-- Przyciski Główne -->
               <div class="media-button-grid">
                  <a target="_blank" href="https://www.planeta.pl/" class="btn btn-primary">🌐 Strona</a>
                  <a target="_blank" href="https://forum.radiopolska.pl/index.php?showtopic=8498" class="btn btn-secondary">Forum RP</a>
                  <a target="_blank" href="https://forum.satkurier.pl/topic/50980-planeta-fm-2002-2013/" class="btn btn-secondary">Forum SK</a>
                  <a target="_blank" href="https://forum.media2.pl/viewtopic.php?t=253" class="btn btn-secondary">Forum M2</a>
               </div>
               <!-- Social Media -->
               <div class="media-socials">
                  <a target="_blank" href="https://www.fb.com/100064812337782" title="Facebook"><i class="fa-brands fa-facebook"></i></a>
                  <a target="_blank" href="https://www.instagram.com/planeta_pl/" title="Instagram"><i class="fa-brands fa-instagram"></i></a>
                  <a target="_blank" href="https://x.com/Planeta_FM" title="X"><i class="fa-brands fa-x-twitter"></i></a>
               </div>
               <!-- Wybór Stacji -->
               <div class="media-player-choice">
                  <a target="_blank" href="https://krdrt5370000ym.github.io/radios/planetafm" class="btn btn-radio"><i class="fa-solid fa-radio"></i> Radio</a>
               </div>
               <!-- Menu Nawigacyjne -->
               <nav class="media-navigation">
                  <ul class="main-menu">
                     <li><a href="https://www.planeta.pl/">Start</a></li>
                     <li><a href="https://www.planeta.pl/Wiadomosci">Wiadomości</a></li>
                     <li><a href="https://www.planeta.pl/Pogoda">Pogoda</a></li>
                     <li><a href="https://www.planeta.pl/Ciekawostki">Ciekawostki</a></li>
                  </ul>
               </nav>
            </div>
            <div class="tabs">
               <!-- 1. Inputy sterujące (muszą być rodzeństwem dla .content) -->
               <input type="radio" id="tab1" name="my-tabs" checked>
               <!-- 2. Kontener na etykiety (tylko do wyglądu/środkowania) -->
               <div class="tabs-wrapper">
                  <label for="tab1"><i class="fa-brands fa-facebook"></i></label>
               </div>
               <!-- Treść zakładek -->
               <div class="content tab1-content">
                  <div class="fb-viewer">
                     <div class="fb-container" id="fb-box">
                        <!-- Domyślnie załadowany pierwszy profil -->
                        <iframe id="fb-iframe"
                           src="https://www.facebook.com/plugins/page.php?href=https://www.facebook.com/100064812337782/&tabs=timeline&width=500&height=500&small_header=true&adapt_container_width=true&hide_cover=true&show_facepile=true&locale=pl_PL"
                           width="500" height="500" style="border:none;overflow:hidden" scrolling="no" frameborder="0" allowfullscreen="true" allow="autoplay; clipboard-write; encrypted-media; picture-in-picture; web-share">
                        </iframe>
                     </div>
                  </div>
               </div>
            </div>
         </div>
         <script src="/site-bottomscreen.js"></script>
      </div>
      <script src="/site-sidebar.js"></script>
      <script src="media.js"></script>
      <script src="menu.js"></script>
   </body>
</html>
