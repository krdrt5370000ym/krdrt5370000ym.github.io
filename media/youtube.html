<!DOCTYPE html>
<html>
   <head>
      <title>YT Audio Player | krdrt537000ym.github.io</title>
      <script src="/site-head.js"></script>
      <link rel="stylesheet" href="/style.css">
      <link rel="stylesheet" href="youtube.css">
   </head>
   <body class="w3-light-grey">
      <script src="/site-topscreen.js"></script>
      <div class="w3-main" style="margin-left:300px;margin-top:43px;">
         <!-- Header -->
         <header class="w3-container" style="padding-top:22px">
            <h5><b><i class="fa-brands fa-youtube"></i> YT Audio Player</b></h5>
         </header>
         <div class="w3-row-padding w3-margin-bottom">
            <div class="main-player">
               <div class="player" id="article-post">
                  <span id="info-id"></span>
                  <span id="song-title">Wczytywanie...</span>
                  <div id="time-display">0:00 / 0:00</div>
                  <div id="status-info"></div>
                  <div class="controls">
                     <button onclick="changeVolume(-10)">- 10%</button>
                     <button id="muteBtn" onclick="toggleMute()">🔊 Unmuted</button>
                     <button onclick="changeVolume(10)">+ 10%</button>
                  </div>
                  <div class="controls">
                     <button id="playBtn" onclick="togglePlay()">▶ Play</button>
                     <button onclick="stopVideo()">■ Stop</button>
                     <button id="loopBtn" onclick="toggleLoop()">🔁 Pętla: WYŁ</button>
                  </div>
                  <div class="controls">
                     <button onclick="smartJump(-1)">⏪ Cofnij</button>
                     <button onclick="smartJump(1)">Szybciej ⏩</button>
                  </div>
                  <div class="input-group">
                     <label for="time">Czas: </label>
                     <input type="text" id="time" placeholder="np. 0:48" onkeypress="handleEnter(event)">
                     <button onclick="seekTo()">⏩ Czas</button>
                  </div>
                  <div id="yt-player"></div>
               </div>
            </div>
         </div>
         <script src="youtube.js"></script>
         <script src="/site-bottomscreen.js"></script>
      </div>
      <script src="/site-sidebar.js"></script>
   </body>
</html>
