<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Audio Player Pro</title>

<style>
body {
    font-family: sans-serif;
    background: #f4f4f4;
    display: flex;
    justify-content: center;
    padding-top: 40px;
}
.player {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 360px;
    text-align: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    display: none;
}
#song-title { font-weight: bold; margin-bottom: 10px; }
#time-display { font-family: monospace; font-size: 20px; margin: 15px 0; }
.controls { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
button { padding: 10px; cursor: pointer; }
</style>
</head>

<body>

<div class="player" id="app">
    <div id="song-title">Ładowanie...</div>
    <div id="time-display">0:00 / 0:00</div>

    <div class="controls">
        <button onclick="togglePlay()" id="playBtn">▶</button>
        <button onclick="stopVideo()">■</button>
        <button onclick="toggleLoop()" id="loopBtn">🔁 OFF</button>
    </div>

    <div class="controls">
        <button onclick="smartJump(-1)">⏪</button>
        <button onclick="smartJump(1)">⏩</button>
    </div>

    <div class="controls">
        <button onclick="changeVolume(-10)">-</button>
        <button onclick="toggleMute()" id="muteBtn">🔊</button>
        <button onclick="changeVolume(10)">+</button>
    </div>

    <div>
        <input id="timeInput" placeholder="1:20">
        <button onclick="seekTo()">GO</button>
    </div>

    <div id="yt"></div>
</div>

<script>
// PARAM
const id = new URLSearchParams(location.search).get("id");

if (id) document.getElementById("app").style.display = "block";

// ✅ POPRAWNE API
let tag = document.createElement("script");
tag.src = "https://www.youtube.com/iframe_api";
document.head.appendChild(tag);

let player, playing=false, looping=false, timer;

// AUDIO HACK (pomaga w mobile)
let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
document.addEventListener("click", () => {
    if (audioCtx.state === "suspended") audioCtx.resume();
});

// INIT
function onYouTubeIframeAPIReady() {
    if (!id) return;

    player = new YT.Player("yt", {
        height: "0",
        width: "0",
        videoId: id,
        playerVars: {
            autoplay: 0,
            controls: 0,
            disablekb: 1,
            playsinline: 1
        },
        events: {
            onReady: onReady,
            onStateChange: onState
        }
    });
}

function onReady() {
    let title = player.getVideoData().title;
    document.getElementById("song-title").textContent = title;

    // MEDIA SESSION (lock screen)
    if ("mediaSession" in navigator) {
        navigator.mediaSession.metadata = new MediaMetadata({
            title: title
        });

        navigator.mediaSession.setActionHandler("play", togglePlay);
        navigator.mediaSession.setActionHandler("pause", togglePlay);
        navigator.mediaSession.setActionHandler("seekbackward", ()=>smartJump(-1));
        navigator.mediaSession.setActionHandler("seekforward", ()=>smartJump(1));
    }
}

// PLAYER STATE
function onState(e){
    let btn = document.getElementById("playBtn");

    if(e.data === YT.PlayerState.PLAYING){
        playing = true;
        btn.textContent = "⏸";
        timer = setInterval(updateTime, 500);
    } else {
        playing = false;
        btn.textContent = "▶";
        clearInterval(timer);

        if(e.data === YT.PlayerState.ENDED && looping){
            player.seekTo(0);
            player.playVideo();
        }
    }
}

// CONTROLS
function togglePlay(){
    if(!player) return;
    playing ? player.pauseVideo() : player.playVideo();
}

function stopVideo(){
    player.stopVideo();
}

function toggleLoop(){
    looping = !looping;
    document.getElementById("loopBtn").textContent = looping ? "🔁 ON" : "🔁 OFF";
}

function toggleMute(){
    if(player.isMuted()){
        player.unMute();
        document.getElementById("muteBtn").textContent="🔊";
    } else {
        player.mute();
        document.getElementById("muteBtn").textContent="🔇";
    }
}

function changeVolume(v){
    let vol = Math.max(0, Math.min(100, player.getVolume()+v));
    player.setVolume(vol);
}

// SEEK
function smartJump(dir){
    let t = player.getCurrentTime();
    player.seekTo(t + (10*dir), true);
}

function seekTo(){
    let val = document.getElementById("timeInput").value;
    if(!val) return;

    let s = val.includes(":")
        ? val.split(":")[0]*60 + val.split(":")[1]*1
        : val*1;

    player.seekTo(s, true);
}

// TIME
function updateTime(){
    let c = player.getCurrentTime();
    let d = player.getDuration();

    document.getElementById("time-display").textContent =
        format(c)+" / "+format(d);
}

function format(s){
    if(!s) return "0:00";
    let m = Math.floor(s/60);
    let sec = Math.floor(s%60);
    return m+":"+(sec<10?"0":"")+sec;
}
</script>

</body>
</html>
