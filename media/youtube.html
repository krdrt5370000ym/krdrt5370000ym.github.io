<!doctype html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>YT Audio Player</title>

    <style>
        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#121212;
            color:#fff;
            font-family:Arial,sans-serif;
            padding:20px;
        }

        .player-card{
            width:100%;
            max-width:400px;
            background:#1e1e1e;
            border-radius:18px;
            padding:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.5);
        }

        .thumb{
            width:100%;
            border-radius:14px;
            margin-bottom:15px;
            display:none;
        }

        #song-title{
            display:block;
            margin-bottom:15px;
            font-size:18px;
            font-weight:bold;
            color:#00aaff;
            line-height:1.4;
        }

        audio{
            width:100%;
            margin-bottom:15px;
            filter:invert(100%);
        }

        .actions{
            display:flex;
            justify-content:center;
            gap:10px;
            flex-wrap:wrap;
        }

        .btn{
            display:inline-block;
            padding:10px 16px;
            border-radius:8px;
            text-decoration:none;
            font-size:14px;
            font-weight:bold;
            transition:.2s;
        }

        .btn-download{
            background:#00aaff;
            color:#000;
        }

        .btn-download:hover{
            background:#0088cc;
        }

        .status{
            margin-top:12px;
            font-size:13px;
            color:#aaa;
        }

        .loader{
            width:40px;
            height:40px;
            border:4px solid #333;
            border-top:4px solid #00aaff;
            border-radius:50%;
            animation:spin 1s linear infinite;
            margin:15px auto;
        }

        @keyframes spin{
            to{
                transform:rotate(360deg);
            }
        }
    </style>
</head>
<body>

<div class="player-card">

    <img
        id="thumb"
        class="thumb"
        alt="Miniatura"
    >

    <span id="song-title">
        Ładowanie...
    </span>

    <div id="loader" class="loader"></div>

    <audio
        id="audio-ctrl"
        controls
        preload="metadata"
    ></audio>

    <div class="actions">

        <a
            id="dl-link"
            href="#"
            class="btn btn-download"
            style="display:none;"
        >
            POBIERZ AUDIO
        </a>

    </div>

    <div id="status" class="status"></div>

</div>

<script>

const API_URL =
    'https://youtube.krdrt5370000ym2.workers.dev';

async function init(){

    const titleEl  =
        document.getElementById('song-title');

    const audioEl  =
        document.getElementById('audio-ctrl');

    const dlEl     =
        document.getElementById('dl-link');

    const statusEl =
        document.getElementById('status');

    const loaderEl =
        document.getElementById('loader');

    const thumbEl  =
        document.getElementById('thumb');

    // VIDEO ID
    const vId =
        new URLSearchParams(window.location.search)
            .get('v')
        || 'Qb6Bd1J954o';

    try {

        statusEl.textContent =
            'Łączenie z API...';

        // FETCH API
        const response =
            await fetch(`${API_URL}/?id=${vId}`);

        if(!response.ok){

            throw new Error(
                `HTTP ${response.status}`
            );

        }

        const data =
            await response.json();

        console.log('API RESPONSE:', data);

        if(!data.success){

            throw new Error(
                data.error || 'Brak audio'
            );

        }

// AUDIO URL (FIX)
const audioUrl =
    data.source.audioOnlyUrl
    || data.source.downloadedFileUrl;

if(!audioUrl){
    throw new Error('Brak URL audio');
}

// AUDIO SOURCE
audioEl.src = audioUrl;
audioEl.type =
    data.format === 'mp3'
        ? 'audio/mpeg'
        : 'audio/webm';

        // TITLE
        titleEl.textContent =
            'Ładowanie audio...';

        // THUMBNAIL
        thumbEl.src =
            `https://i.ytimg.com/vi/${data.videoId}/hqdefault.jpg`;

        thumbEl.style.display =
            'block';

        // AUDIO SOURCE
        audioEl.src =
            audioUrl;

        // IMPORTANT
        audioEl.crossOrigin =
            'anonymous';

        // DOWNLOAD BUTTON
dlEl.href = data.source.audioOnlyUrl || data.source.downloadedFileUrl || audioUrl;

dlEl.download =
    data.results?.[0]?.fileKey
    || `${data.videoId}.mp3`;

        dlEl.style.display =
            'inline-block';

        // AUDIO EVENTS
        audioEl.addEventListener(
            'canplay',
            () => {

                statusEl.textContent =
                    'Gotowe';

                loaderEl.style.display =
                    'none';

            }
        );

        audioEl.addEventListener(
            'error',
            (e) => {

                console.error(
                    'AUDIO ERROR',
                    e
                );

                statusEl.textContent =
                    'Błąd odtwarzania audio';

            }
        );

        // AUTOPLAY
        try {

            await audioEl.play();

        } catch(e){

            console.warn(
                'Autoplay blocked'
            );

        }

        // UPDATE TITLE
        await updateTitle(data.videoId);

        // MEDIA SESSION
        setupMediaSession(data.videoId);

    } catch(e){

        console.error(e);

        loaderEl.style.display =
            'none';

        titleEl.textContent =
            'Błąd połączenia';

        statusEl.textContent =
            e.message;

    }

}

async function updateTitle(id){

    try {

        const r =
            await fetch(
                `https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`
            );

        const d =
            await r.json();

        if(d.title){

            document.getElementById(
                'song-title'
            ).textContent =
                d.title;

            document.title =
                d.title;

        }

    } catch(e){

        console.error(e);

    }

}

async function setupMediaSession(id){

    if(
        !('mediaSession' in navigator)
    ){
        return;
    }

    try {

        const r =
            await fetch(
                `https://noembed.com/embed?url=https://www.youtube.com/watch?v=${id}`
            );

        const d =
            await r.json();

        navigator.mediaSession.metadata =
            new MediaMetadata({

                title:
                    d.title || 'YT Audio',

                artist:
                    d.author_name || 'YouTube',

                album:
                    'YouTube Audio',

                artwork: [
                    {
                        src:
                            `https://i.ytimg.com/vi/${id}/hqdefault.jpg`,
                        sizes:'480x360',
                        type:'image/jpeg'
                    }
                ]

            });

    } catch(e){

        console.error(e);

    }

}

init();

</script>

</body>
</html>
