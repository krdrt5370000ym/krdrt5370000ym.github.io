<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Klubowy Player | krdrt537000ym.github.io</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .filter {
      margin-bottom: 20px;
    }

    select {
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item {
      background: #1e1e1e;
      border-radius: 10px;
      padding: 15px;
      transition: 0.2s;
    }

    .item:hover {
      background: #2c2c2c;
    }

    .title {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .category {
      color: #aaa;
      font-size: 14px;
    }
    
    .search-box {
      margin-bottom: 15px;
    }

    #searchInput {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
    }

    button,
    a.play-link {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 14px;
      border-radius: 6px;
      border: none;
      text-decoration: none;
      cursor: pointer;
      background: #ff6600;
      color: white;
      font-weight: bold;
    }

    .audio-player {
      margin-bottom: 30px;
    }
    
    audio {
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>
    
  <a href="https://krdrt5370000ym.github.io/" style="text-decoration:none;color:white;">Wstecz</a>

  <h1>Klubowy Player</h1>

  <!-- GŁÓWNY PLAYER -->
  <div class="audio-player">
    <audio id="mainPlayer" controls style="display:none;">
      <source id="mainSource" src="">
    </audio>
  </div>

<!-- WYSZUKIWARKA -->
<div class="search-box">
  <input 
    type="text" 
    id="searchInput"
    placeholder="Szukaj seta lub kategorii..."
  >
</div>

<!-- FILTR -->
<div class="filter">
  <label for="categoryFilter">Kategoria:</label>

  <select id="categoryFilter">
    <option value="all">Wszystkie</option>
  </select>
</div>

  <div class="list" id="clubList"></div>

  <script>
    const jsonUrl = 'https://krdrt5370000ym.github.io/media/json/clubs.json';

    let allClubs = [];

    async function loadClubs() {
      try {
        const response = await fetch(jsonUrl);
        const data = await response.json();

        allClubs = data.clubs;

        createCategories(allClubs);
        renderList(allClubs);

        // FILTR KATEGORII
        document
          .getElementById('categoryFilter')
          .addEventListener('change', filterClubs);

        // WYSZUKIWARKA
        document
          .getElementById('searchInput')
          .addEventListener('input', filterClubs);

      } catch (error) {
        console.error('Błąd ładowania JSON:', error);
      }
    }

    function filterClubs() {

      const category =
        document.getElementById('categoryFilter').value;

      const search =
        document.getElementById('searchInput')
          .value
          .toLowerCase();

      const filtered = allClubs.filter(club => {

        const matchCategory =
          category === 'all' ||
          club.category === category;

        const matchSearch =
          club.name.toLowerCase().includes(search) ||
          club.category.toLowerCase().includes(search);

        return matchCategory && matchSearch;
      });

      renderList(filtered);
    }

    function createCategories(clubs) {
      const select = document.getElementById('categoryFilter');

      const categories = [
        ...new Set(clubs.map(club => club.category))
      ];

      categories.forEach(category => {
        const option = document.createElement('option');

        option.value = category;
        option.textContent = category;

        select.appendChild(option);
      });
    }

    function renderList(clubs) {
      const list = document.getElementById('clubList');

      list.innerHTML = '';

      clubs.forEach(club => {

        const item = document.createElement('div');
        item.className = 'item';

        let button = '';

        // audio=true → odtwarzaj w playerze
        if (club.audio === true) {
          button = `
            <button onclick="playAudio('${club.value}')">
              ▶ Odtwórz
            </button>
          `;
        }

        // audio=false → otwórz link
        if (club.audio === false) {
          button = `
            <a href="${club.value}" target="_blank">
              <button>
                Otwórz w przeglądarce
              </button>
            </a>
          `;
        }

        item.innerHTML = `
          <div class="title">
            ${club.name} |
            <span class="category">
              ${club.category}
            </span>
          </div>

          ${button}
        `;

        list.appendChild(item);
      });
    }

    function playAudio(url) {
      const player = document.getElementById('mainPlayer');
      const source = document.getElementById('mainSource');

      source.src = url;

      // pokaż player
      player.style.display = 'block';

      player.load();
      player.play();

      // przewiń do playera
      window.scrollTo({
        top: player.offsetTop - 50,
        behavior: 'smooth'
      });
    }

    loadClubs();
  </script>

</body>
</html>
