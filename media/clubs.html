<!DOCTYPE html>
<html lang="pl">
   <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>Klubowy Player | krdrt537000ym.github.io</title>
      <link rel="stylesheet" href="/style.css">
      <link rel="stylesheet" href="clubs.css">
      <script src="https://krdrt5370000ym.github.io/site-head.js"></script>
      <script src="https://krdrt5370000ym.github.io/player/player-head.js"></script>
   </head>
   <body>
      <a href="https://krdrt5370000ym.github.io/" style="text-decoration:none;color:white;">Wstecz</a> | <a href="https://www.beatport.com" style="text-decoration:none;color:white;">Beatport</a>
      <h1>Klubowy Player</h1>
      <h2>
         <span id="set-title"></span>
      </h2>
      <!-- GŁÓWNY PLAYER -->
      <div class="audio-player">
         <audio id="mainPlayer" controls style="display:none;">
            <source id="mainSource" src="">
         </audio>
      </div>
      <!-- WYSZUKIWARKA -->
      <div class="search-box">
         <input type="text" id="searchInput" placeholder="Szukaj seta lub kategorii...">
      </div>
      <!-- FILTR -->
      <div class="filter">
         <label for="categoryFilter">Kategoria:</label>
         <select id="categoryFilter">
            <option value="all">Wszystkie</option>
         </select>
      </div>
      <div class="list" id="clubList"></div>
      <script src="clubs.js"></script>
   </body>
