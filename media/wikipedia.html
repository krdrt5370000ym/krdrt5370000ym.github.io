<!DOCTYPE html>
<html>
<head>
   <title>Wikipedia | krdrt537000ym.github.io</title>
   <script src="https://krdrt5370000ym.github.io/site-head.js"></script>

   <link rel="stylesheet" href="https://krdrt5370000ym.github.io/media/media-a.css">
   <link rel="stylesheet" href="https://krdrt5370000ym.github.io/style.css">
</head>
<body class="w3-light-grey">
<script src="https://krdrt5370000ym.github.io/site-topscreen.js"></script>
<div class="w3-main" style="margin-left:300px;margin-top:43px;">
   <header class="w3-container" style="padding-top:22px">
      <h5>
         <b><i class="fa-brands fa-wikipedia-w"></i> Wikipedia</b>
      </h5>
   </header>
   <div class="w3-row-padding w3-margin-bottom">
      <div style="margin-left:10px;" id="wiki-post">
         Ładowanie treści...
      </div>
   </div>
   <script src="https://krdrt5370000ym.github.io/site-bottomscreen.js"></script>
</div>
<script>
async function loadWikiPage() {
   const params = new URLSearchParams(window.location.search);
   const page = params.get('id');
   // Default language
   const language = params.get('lang') || 'pl';
   // Default project
   const project = params.get('p') || 'wikipedia';
   // If no page selected
   if (!page) {
      document.getElementById('wiki-post').innerHTML =
         '<p>Brak artykułu</p>';
      return;
   }
   try {
      const response = await fetch(
         `https://${language}.${project}.org/w/api.php?action=parse&page=${encodeURIComponent(page)}&prop=text&formatversion=2&format=json&origin=*`
      );
      const data = await response.json();
      // Check errors
      if (!data.parse) {
         document.getElementById('wiki-post').innerHTML =
            '<p>Nie znaleziono artykułu</p>';
         return;
      }
      // Remove stylesheet links
      let cleanHtml = data.parse.text
         .replace(/<link[^>]*stylesheet[^>]*>/gi, '')
         .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '');
      document.getElementById('wiki-post').innerHTML = `<h2><b>${data.parse.title}</b></h2>${cleanHtml}`;
      document.title = data.parse.title + ' | krdrt537000ym.github.io';
   } catch (error) {
      document.getElementById('wiki-post').innerHTML =
         '<p>Błąd ładowania artykułu</p>';
      console.error(error);
   }
}
loadWikiPage();
</script>
<script src="https://krdrt5370000ym.github.io/site-sidebar.js"></script>
</body>
</html>
