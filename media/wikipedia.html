<!DOCTYPE html>
<html>
   <head>
      <title>Wikipedia | krdrt537000ym.github.io</title>
      <script src="/site-head.js"></script>
      <link rel="stylesheet" href="media-a.css">
      <link rel="stylesheet" href="/style.css">
   </head>
   <body class="w3-light-grey">
      <script src="/site-topscreen.js"></script>
      <div class="w3-main" style="margin-left:300px;margin-top:43px;">
         <!-- Header -->
         <header class="w3-container" style="padding-top:22px">
            <h5><b><i class="fa-brands fa-wikipedia-w"></i> Wikipedia</b></h5>
         </header>
         <div class="w3-row-padding w3-margin-bottom">
            <!-- To ID musi istnieć w momencie wywołania funkcji -->
            <div style="margin-left: 10px;" id="wiki-post">Ładowanie treści...</div>
         </div>
         <script src="/site-bottomscreen.js"></script>
      </div>
      <!-- Skrypt silnika artykułów na końcu -->
<script>
async function loadWikiPage() {
  const params = new URLSearchParams(window.location.search);
  const page = params.get('id');
  const language = params.get('lang') || 'pl';
  const project = params.get('p') || 'wikipedia';
  const response = await fetch(
    `https://${language}.${project}.org/w/api.php?action=parse&page=${page}&prop=text&formatversion=2&format=json&origin=*`
  );
  const data = await response.json();
  document.getElementById('wiki-post').innerHTML = `<div class="article_title_posts">${data.parse.title}</div>${data.parse.text}`;}
loadWikiPage();
</script>
      <script src="/site-sidebar.js"></script>
   </body>
</html>
