<!DOCTYPE html>
<html>
   <head>
      <title>Artykuł | krdrt537000ym.github.io</title>
      <script src="/site-head.js"></script>
      <link rel="stylesheet" href="media-a.css">
      <link rel="stylesheet" href="/style.css">
   </head>
   <body class="w3-light-grey">
      <script src="/site-topscreen.js"></script>
      <div class="w3-main" style="margin-left:300px;margin-top:43px;">
         <!-- Header -->
         <header class="w3-container" style="padding-top:22px">
            <h5><b><i class="fa-solid fa-newspaper"></i> Artykuł</b></h5>
         </header>
         <div class="w3-row-padding w3-margin-bottom">
            <!-- To ID musi istnieć w momencie wywołania funkcji -->
            <div style="margin-left: 10px;" id="article-post">Ładowanie treści...</div>
        </div>
         <script src="/site-bottomscreen.js"></script>
    </div>
    <!-- Skrypt silnika artykułów na końcu -->
    <script>

    (function() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const site = params.get('si');
        const type = params.get('tp');

        const siteMap = {
            "radiorsc": {"url": "https://radiorsc.pl", "is_http": false},
            "radiovictoria": {"url": "https://radiovictoria.pl", "is_http": false},
            "radiokolor": {"url": "https://radiokolor.pl", "is_http": false},
            "sosw": {"url": "https://soswskierniewice.pl", "is_http": false},
            "ckis": {"url": "https://cekis.pl", "is_http": true},
        };

        if (!id || !site || !siteMap[site]) {
            document.getElementById('article-post').innerHTML = "Błąd: Nieprawidłowe parametry URL.";
            return;
        }

        const { url: mainUrl, is_http } = siteMap[site];

        // Funkcja uruchamiająca odpowiedni moduł
        function inicjuj() {
            try {
                if (type === 'post') {
                    if (site === 'radiorsc' && typeof WPArticlePostRSC === 'function') {
                        WPArticlePostRSC(id);
                    } else if (typeof WPArticlePost === 'function') {
                        WPArticlePost(id, mainUrl, undefined, undefined, undefined, undefined, is_http);
                    }
                } else if (type === 'page' && typeof WPArticlePage === 'function') {
                    WPArticlePage(id, mainUrl, is_http);
                } else {
                    throw new Error("Nie znaleziono funkcji ładującej.");
                }
            } catch (e) {
                console.error(e);
                document.getElementById('article-post').innerHTML = "Błąd podczas ładowania modułu.";
            }
        }

        // Czekamy na pełne załadowanie DOM i skryptów zewnętrznych
        window.addEventListener('load', inicjuj);
    })();
    </script>
    <script src="article-index.js"></script>
      <script src="/site-sidebar.js"></script>
   </body>
</html>
