<!DOCTYPE html>
<html>
   <head>
      <title>Lista artykułów | krdrt537000ym.github.io</title>
      <script src="/site-head.js"></script>
      <link rel="stylesheet" href="media.css">
      <link rel="stylesheet" href="/style.css">
   </head>
   <body class="w3-light-grey">
      <script src="/site-topscreen.js"></script>
      <div class="w3-main" style="margin-left:300px;margin-top:43px;">
         <!-- Header -->
         <header class="w3-container" style="padding-top:22px">
            <h5><b><i class="fa-solid fa-newspaper"></i> Artykuł</b></h5>
         </header>
         <div class="w3-row-padding w3-margin-bottom">
            <!-- To ID musi istnieć w momencie wywołania funkcji -->
            <p class="article_result" id="article-s-result"></p>
            <p class="article_result" id="article-c-result"></p>
            <p class="article_result" id="article-t-result"></p>
            <p class="article_result" id="article-a-result"></p>
            <div style="margin-left: 10px;" id="article-list">Ładowanie aktualności...</div>
        </div>
         <script src="/site-bottomscreen.js"></script>
    </div>
    <script src="site-article.js"></script>
    <!-- Skrypt silnika artykułów na końcu -->
    <script>
(function () {
    "use strict";

    const params = new URLSearchParams(window.location.search);

    const site = params.get("si");
    const search = params.get("s") || "";
    const category = params.get("c") || "";
    const tag = params.get("t") || "";
    const author = params.get("a") || "";
    const type = params.get("tp") || "post";

    const siteMap = {
        radiorsc: { url: "https://radiorsc.pl", is_http: false },
        radiovictoria: { url: "https://radiovictoria.pl", is_http: false },
        radiokolor: { url: "https://radiokolor.pl", is_http: false },
        sosw: { url: "https://soswskierniewice.pl", is_http: false },
        ckis: { url: "https://cekis.pl", is_http: true }
    };

    const container = document.getElementById("article-post");

    function showError(msg) {
        if (container) container.innerHTML = msg;
    }

    // Walidacja site
    if (!site || !siteMap[site]) {
        showError("Błąd: Nieprawidłowe parametry URL.");
        return;
    }

    const { url: mainUrl, is_http } = siteMap[site];

    function init() {
        try {
            if (typeof window.WPArticleList === "function") {
                window.WPArticleList(
                    mainUrl,
                    site,
                    is_http,
                    type,
                    search,
                    category,
                    tag,
                    author
                );
            } else {
                throw new Error("Nie znaleziono funkcji WPArticleList.");
            }
        } catch (err) {
            console.error(err);
            showError("Błąd podczas ładowania modułu.");
        }
    }

    window.addEventListener("DOMContentLoaded", init);
})();
    </script>
      <script src="/site-sidebar.js"></script>
   </body>
</html>
