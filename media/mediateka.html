<!DOCTYPE html>
<html>
   <head>
      <title>Mediateka, słuchaj online | krdrt537000ym.github.io</title>
      <script src="/site-head.js"></script>
   </head>
   <body class="w3-light-grey">
      <link rel="stylesheet" href="media.css">
      <link rel="stylesheet" href="/style.css">
      <script src="/site-topscreen.js"></script>
      <div class="w3-main" style="margin-left:300px;margin-top:43px;">
         <!-- Header -->
         <header class="w3-container" style="padding-top:22px">
            <h5>
               <b>
               <i class="fa-solid fa-photo-film"></i> Media</b>
            </h5>
         </header>
         <div class="w3-row-padding w3-margin-bottom">
            <div class="media-container">
               <!-- Przyciski Główne -->
               <div class="media-button-grid">
                  <a target="_blank" href="https://mediateka.pl/" class="btn btn-primary">🌐 Strona</a>
               </div>
               <!-- Menu Nawigacyjne -->
               <nav class="media-navigation">
                  <ul class="main-menu">
                     <li><a href="https://mediateka.pl/">Start</a></li>
                  </ul>
               </nav>
            </div>
            <div class="tabs">
               <!-- 1. Inputy sterujące (muszą być rodzeństwem dla .content) -->
               <input type="radio" id="tab1" name="my-tabs" checked>
               <!-- 2. Kontener na etykiety (tylko do wyglądu/środkowania) -->
               <div class="tabs-wrapper">
                  <label for="tab1">Podcasty</label>
               </div>
               <!-- Treść zakładek -->
               <div class="content tab1-content">
                  <div class="podcasts_display" id="AllProgramsDisplay" style="display:block;">
                     <h3>Podcasty</h3>
                     <input type="text" id="searchInput" placeholder="Szukaj podcastu lub autora..." oninput="renderPodcasts()">
                     <select id="categoryFilter" onchange="renderPodcasts()">
                        <option value="">Wszystkie kategorie</option>
                        <option value="Podcasty">Podcasty</option>
                     </select>
                     <div class="podcast_list" id="podcast_list"></div>
                  </div>
               </div>
            </div>
         </div>
         <script src="/site-bottomscreen.js"></script>
      </div>
      <script src="/site-sidebar.js"></script>
      <script src="site-article.js"></script>
      <script src="media.js"></script>
      <script>
         loadData('mediateka').then(init);
      </script>
      <script src="menu.js"></script>
   </body>
</html>
