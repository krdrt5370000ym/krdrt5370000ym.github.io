<!doctype html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Audio Player</title>

<style>
* { box-sizing: border-box; }

body {
   margin: 0;
   min-height: 100vh;
   display: flex;
   justify-content: center;
   align-items: center;
   background: #121212;
   color: #fff;
   font-family: Arial, sans-serif;
   padding: 20px;
}

.player-card {
   width: 100%;
   max-width: 400px;
   background: #1e1e1e;
   border-radius: 18px;
   padding: 20px;
   text-align: center;
   box-shadow: 0 10px 30px rgba(0,0,0,.5);
}

#song-title {
   display: block;
   margin-bottom: 15px;
   font-size: 18px;
   font-weight: bold;
   color: #00aaff;
}

audio {
   width: 100%;
   margin-bottom: 15px;
}

.actions {
   display: flex;
   justify-content: center;
   gap: 10px;
}

.btn {
   padding: 10px 16px;
   border-radius: 8px;
   text-decoration: none;
   font-weight: bold;
   background: #00aaff;
   color: #000;
}

.status {
   margin-top: 12px;
   font-size: 13px;
   color: #aaa;
}

.loader {
   width: 40px;
   height: 40px;
   border: 4px solid #333;
   border-top: 4px solid #00aaff;
   border-radius: 50%;
   animation: spin 1s linear infinite;
   margin: 15px auto;
}

@keyframes spin {
   to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="player-card">
   <span id="song-title">Ładowanie...</span>

   <div id="loader" class="loader"></div>

   <audio id="audio-ctrl" controls><source src=""></audio>

   <div class="actions">
      <a id="dl-link" class="btn" href="#">POBIERZ</a>
   </div>

   <div id="status" class="status"></div>
</div>

<script>
const API_URL = 'https://streamcloud.krdrt5370000ym2.workers.dev';

async function forceDownload(url, name) {
   const res = await fetch(url);
   const blob = await res.blob();

   const a = document.createElement("a");
   a.href = URL.createObjectURL(blob);
   a.download = name;
   a.click();
}

async function init() {

   const titleEl = document.getElementById('song-title');
   const audioEl = document.getElementById('audio-ctrl');
   const dlEl = document.getElementById('dl-link');
   const statusEl = document.getElementById('status');
   const loaderEl = document.getElementById('loader');

   const videoUrl =
      new URLSearchParams(window.location.search).get('url');

   try {

      statusEl.textContent = 'Łączenie z API...';

      const response = await fetch(
         `${API_URL}/?url=${encodeURIComponent(videoUrl)}`
      );

      if (!response.ok) {
         throw new Error(`HTTP ${response.status}`);
      }

      const data = await response.json();

      console.log("FULL API RESPONSE:", data);

titleEl.textContent = data?.results?.[0]?.result?.title || "Brak tytułu";

const item = data?.results?.[0];

const media = item?.result?.medias?.[0];

const audioUrl = media?.url;
const title = item?.result?.title || "audio.mp3";
const ext = media?.extension || "mp3";

if (!audioUrl) {
   console.log(data);
   throw new Error("Brak URL audio");
}

audioEl.src = audioUrl;

dlEl.onclick = (e) => {
   e.preventDefault();
   forceDownload(audioUrl, `${title}.${ext}`);
};

      audioEl.addEventListener('canplay', () => {
         statusEl.textContent = 'Gotowe';
         loaderEl.style.display = 'none';
      });

      audioEl.addEventListener('error', () => {
         statusEl.textContent = 'Błąd audio';
      });

      try {
         audioEl.muted = true;
         await audioEl.play();
         audioEl.muted = false;
      } catch {
         console.warn('Autoplay blocked');
      }

   } catch (e) {
      console.error(e);
      loaderEl.style.display = 'none';
      titleEl.textContent = 'Błąd';
      statusEl.textContent = e.message;
   }
}

init();
</script>

</body>
</html>
