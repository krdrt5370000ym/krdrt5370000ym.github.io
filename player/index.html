<!DOCTYPE html>
<html lang="pl">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Radio internetowe</title>
      <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
      <link rel="icon" type="image/png" href="https://krdrtradio.github.io/favicon.png">
      <link rel="stylesheet" href="https://krdrt5370000ym.github.io/fonts/css/Univia-Pro.css">
      <link rel="stylesheet" href="https://krdrt5370000ym.github.io/fonts/css/SF-Pro-Display.css">
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
      <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
      <link rel="stylesheet" href="style.css">
   </head>
   <body>
      <div id="topbar">
         <span id="menuBtn">☰</span>
         <span>📻 Radio</span>
      </div>
      <div id="sidebar">
         <select id="playlistSelect">
            <option value="Radio">Radio</option>
            <option value="Radio1">Radio1</option>
            <option value="Radio2">Radio2</option>
            <option value="RadioPoland">RadioPoland</option>
            <option value="RadioPoland2">RadioPoland2</option>
            <option value="RadioAbroad">RadioAbroad</option>
            <option value="RadioCzech1">RadioCzech1</option>
            <option value="RadioEnglish1">RadioEnglish1</option>
            <option value="RadioEnglish2">RadioEnglish2</option>
            <option value="RadioFrance1">RadioFrance1</option>
            <option value="RadioFrance2">RadioFrance2</option>
            <option value="RadioGermany1">RadioGermany1</option>
            <option value="RadioGermany2">RadioGermany2</option>
            <option value="RadioGermany3">RadioGermany3</option>
            <option value="RadioGermany4">RadioGermany4</option>
            <option value="RadioItaly1">RadioItaly1</option>
            <option value="RadioItaly2">RadioItaly2</option>
            <option value="RadioSlovak1">RadioSlovak1</option>
            <option value="RadioSpain1">RadioSpain1</option>
            <option value="RadioSpain2">RadioSpain2</option>
            <option value="RadioUK">RadioUK</option>
            <option value="RadioUSA">RadioUSA</option>
         </select>
         <input type="text" id="stationSearch" placeholder="Szukaj...">
         <div id="playlist-container"></div>
      </div>
      <div id="overlay"></div>
      <div id="content">
         <a href="https://krdrtradio.github.io/" style="text-decoration:none;color:inherit;">Wstecz</a>
         <h2 id="currentStation">Wybierz stację</h2>
         <audio id="player" controls style="display:none;"></audio>
         <div>
            <button id="reloadBtn">▶</button>
            <button id="downloadBtn">⬇</button>
         </div>
         <div id="resultTrack"></div>
         <div id="resultSite"></div>
         <div id="resultOpenStreamLink"></div>
      </div>
      <script src="site-nowplaying.js"></script>
      <script src="radios.js"></script>
   </body>
</html>
