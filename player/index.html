<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Radio internetowe</title>
    <script src="https://krdrt5370000ym.github.io/site-head.js"></script>
    <link rel="stylesheet" href="https://krdrt5370000ym.github.io/player/style.css">
    <script src="https://krdrt5370000ym.github.io/player/player-head.js"></script>
</head>
<body>

<div id="sidebar">
    <a style="text-decoration:none;" href="https://krdrt5370000ym.github.io/">Wstecz</a><br>
<!-- Dodajemy zmienną globalną currentPlaylistName -->
    <select onchange="currentPlaylistName = this.value; fetchPlaylist(this.value)">
      <option value="Radio">Radio</option>
      <option value="Radio1">Radio1</option>
      <option value="Radio2">Radio2</option>
      <option value="RadioPoland">RadioPoland</option>
      <option value="RadioPoland2">RadioPoland2</option>
      <option value="RadioAbroad">RadioAbroad</option>
      <option value="RadioCzech1">RadioCzech1</option>
      <option value="RadioEnglish1">RadioEnglish1</option>
      <option value="RadioEnglish2">RadioEnglish2</option>
      <option value="RadioFrance1">RadioFrance1</option>
      <option value="RadioFrance2">RadioFrance2</option>
      <option value="RadioGermany1">RadioGermany1</option>
      <option value="RadioGermany2">RadioGermany2</option>
      <option value="RadioGermany3">RadioGermany3</option>
      <option value="RadioGermany4">RadioGermany4</option>
      <option value="RadioItaly1">RadioItaly1</option>
      <option value="RadioItaly2">RadioItaly2</option>
      <option value="RadioSlovak1">RadioSlovak1</option>
      <option value="RadioSpain1">RadioSpain1</option>
      <option value="RadioSpain2">RadioSpain2</option>
      <option value="RadioUK">RadioUK</option>
      <option value="RadioUSA">RadioUSA</option>
    </select>
    <h3>Stacje Radiowe</h3>
    <div style="margin-bottom: 15px;">
        <input type="text" id="stationSearch" placeholder="Szukaj stacji..." 
               onkeyup="filterStations()" 
               style="width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #ccc;">
    </div>   
    <div id="playlist-container"></div>
</div>

<div id="content">
    <h2 id="current-station">Wybierz stację z listy</h2>
    <audio id="player" style="display:none;" controls></audio>
    <span style="margin-top:10px;"><button id="buttons" style="display:none;"><a href="#" onclick="reloadStation();" style="text-decoration: none;">▶</a></button><button onclick="downloadToM3U()"><i class="fa-solid fa-download"></i> Pobierz listę</button></span><div class="player-playlist" id="resultTrack"></div>
</div>

<script src="https://krdrt5370000ym.github.io/site-nowplaying.js"></script>
<script src="https://krdrt5370000ym.github.io/player/radios.js"></script>
<script>fetchPlaylist('Radio')</script>

</body>
</html>
